name: Weekly Looker Studio Data Pull

on:
  schedule:
    - cron: '0 8 * * 0' # Runs every Monday at midnight UTC
  workflow_dispatch:    # Allows manual testing

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/142538704961/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'journal-dashboard-bot@research-497406.iam.gserviceaccount.com'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Data Pipeline
        run: python scraper.py